# Per-install mpv overrides. Anything here wins over the defaults baked into
# zoetropi-play.sh. Tune for your specific Pi model + display.
#
# Defaults (set in zoetropi-play.sh):
#   hwdec=v4l2m2m-copy   — Pi hardware decoder via V4L2 M2M
#   video-sync=display-resample — frame timing locked to display refresh rate
#   vo=gpu / gpu-context=drm   — GPU renderer on the KMS/DRM plane
#
# Pi 3B tip: the VC4 GPU compositor adds overhead. Switch to the lighter
#   direct framebuffer renderer to save ~10-15% CPU:
# vo=drm
#
# Pi Zero 2 W tip: keep source video at 720p24 H.264. 1080p30 is possible
#   but leaves little headroom. See README for ffmpeg encode settings.

# Uncomment to force a specific decoder:
# hwdec=v4l2m2m
# hwdec=drm

# Uncomment to stretch/letterbox output to a specific aspect:
# video-unscaled=no
# panscan=1.0

# Uncomment to mute all audio (installation has no speakers):
# ao=null
