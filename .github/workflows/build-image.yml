name: Build ZoetroPi image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    # Native ARM64 runner: pi-gen builds without QEMU emulation. Much faster
    # and avoids the binfmt_misc / arm64-not-supported failure on x86_64.
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage files for pi-gen
        run: |
          chmod +x pi-gen/sync-stage-files.sh
          ./pi-gen/sync-stage-files.sh

      - name: Build image with pi-gen
        id: build
        uses: usimd/pi-gen-action@v1
        with:
          image-name: zoetropi
          hostname: zoetropi
          username: pi
          password: zoetropi
          locale: en_US.UTF-8
          timezone: Etc/UTC
          keyboard-layout: us
          wpa-essid: ""
          wpa-password: ""
          enable-ssh: 0
          disable-first-boot-user-rename: 1
          release: trixie
          stage-list: stage0 stage1 stage2 ./pi-gen/stage-zoetropi
          verbose-output: true
          compression: xz
          compression-level: 9

      - name: Show build output paths
        run: |
          echo "image-path:  ${{ steps.build.outputs.image-path }}"
          ls -la "${{ steps.build.outputs.image-path }}" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zoetropi-image
          path: ${{ steps.build.outputs.image-path }}
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build.outputs.image-path }}
          fail_on_unmatched_files: true
